<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 
    - primary meta tags
  -->
    <title>Our Menu - Copper Chimney</title>
    <meta name="title" content="Our Menu - Copper Chimney">
    <meta name="description" content="Explore our diverse menu of Indian delicacies.">

    <!-- 
    - favicon
  -->
    <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">

    <!-- 
    - google font link
  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Forum&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <!-- 
    - custom css link
  -->
    <link rel="stylesheet" href="./assets/css/animation.css">
    <link rel="stylesheet" href="./assets/css/style.css">

    <style>
        .menu-page {
            padding-block: 40px 100px;
        }



        .menu-category-title {
            margin-block: 60px 40px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            text-align: center;
        }

        .menu-category-title::before,
        .menu-category-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: var(--gold-crayola);
            opacity: 0.5;
        }



        @media (max-width: 768px) {


            .menu-category-title {
                gap: 10px;
            }

            .order-form-grid {
                grid-template-columns: 1fr;
            }
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px;
            width: 100%;
            z-index: 100;
        }

        .header-logo {
            width: 120px;
            transition: var(--transition-1);
        }

        .header-logo:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .top-bar {
                padding: 20px;
            }

            .header-logo {
                width: 100px;
            }

            .top-bar .btn {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body id="top">

    <header class="top-bar">
        <a href="index.html" class="logo">
            <img src="./assets/images/copper chimney logo - yellow.png" alt="Copper Chimney" class="header-logo">
        </a>

        <a href="index.html" class="btn btn-secondary">
            <span class="text text-1">Back to Home</span>
            <span class="text text-2" aria-hidden="true">Back to Home</span>
        </a>
    </header>


    <main>
        <article>

            <section class="section menu-page" aria-label="menu-page">
                <div class="container">

                    <p class="section-subtitle text-center label-2">Our Delicacies</p>
                    <h1 class="headline-1 section-title text-center reveal">Our Menu</h1>

                    <!-- Initial items from index.html -->



                    <img src="./assets/images/shape-5.png" width="921" height="1036" loading="lazy" alt="shape"
                        class="shape shape-2 move-anim">
                    <img src="./assets/images/shape-6.png" width="343" height="345" loading="lazy" alt="shape"
                        class="shape shape-3 move-anim">

                </div>
            </section>

        </article>
    </main>

    <footer class="footer section has-bg-image text-center"
        style="background-image: url('./assets/images/footer-bg-new.png')">
        <div class="container">
            <p class="copyright">
                &copy; 2026 Copper Chimney. All Rights Reserved
            </p>
        </div>
    </footer>

    <!-- 
    - custom js link
  -->
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="./assets/js/script.js"></script>
    <script src="./assets/js/menu-generator.js"></script>

    <!-- 
    - ionicon link
  -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

</body>


</html>
